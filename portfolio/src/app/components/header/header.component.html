<header class="header" [class.scrolled]="isScrolled">
  <div class="container">
    <nav class="navbar">
      <!-- Logo -->
      <a class="logo" (click)="scrollToSection('hero')">
        <span class="logo-icon">
          <i class="bi bi-code-slash"></i>
        </span>
        <span class="logo-text">Mohammad<span class="accent">Ali</span></span>
      </a>

      <!-- Desktop Navigation -->
      <ul class="nav-menu">
        <li *ngFor="let item of navItems" class="nav-item">
          <a 
            class="nav-link" 
            [class.active]="activeSection === item.id"
            (click)="scrollToSection(item.id)"
          >
            <i class="bi {{ item.icon }}"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      </ul>

      <!-- CTA Button -->
      <a class="nav-cta" (click)="scrollToSection('contact')">
        <i class="bi bi-chat-dots me-2"></i>
        <span>Let's Talk</span>
      </a>

      <!-- Mobile Menu Toggle -->
      <button 
        class="mobile-toggle" 
        [class.active]="isMobileMenuOpen"
        (click)="toggleMobileMenu()"
        aria-label="Toggle navigation"
      >
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </nav>
  </div>

  <!-- Mobile Navigation -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <div class="mobile-menu-content">
      <ul class="mobile-nav-list">
        <li *ngFor="let item of navItems; let i = index" 
            class="mobile-nav-item"
            [style.animation-delay]="(i * 0.1) + 's'"
        >
          <a 
            class="mobile-nav-link" 
            [class.active]="activeSection === item.id"
            (click)="scrollToSection(item.id)"
          >
            <i class="bi {{ item.icon }}"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      </ul>

      <div class="mobile-social">
        <a href="https://www.linkedin.com/in/mohammad-ali-shikhi/" target="_blank" rel="noopener">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://github.com/mohammad654" target="_blank" rel="noopener">
          <i class="bi bi-github"></i>
        </a>
        <a href="mailto:mohammad.ali.shikhi.55&#64;gmail.com">
          <i class="bi bi-envelope"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div 
    class="mobile-overlay" 
    [class.visible]="isMobileMenuOpen"
    (click)="closeMobileMenu()"
  ></div>
</header>
